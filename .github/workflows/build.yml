name: Build Pumpkin ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add aarch64-linux-android

      # 🔥 Install Android NDK
      - name: Install NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

      # 🔥 Set environment biar Rust nemu clang
      - name: Setup NDK env
        run: |
          echo "NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV
          echo "PATH=$PWD/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target aarch64-linux-android

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: pumpkin-android
          path: target/aarch64-linux-android/release/
