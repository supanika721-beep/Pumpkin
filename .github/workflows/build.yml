name: Build Pumpkin Android ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil source code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 3. Tambah target Android
      - name: Add target
        run: rustup target add aarch64-linux-android

      # 4. Install Android NDK
      - name: Install NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

      # 5. Setup environment + build
      - name: Build
        run: |
          export NDK=$PWD/android-ndk-r26d
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=21

          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          export AR=$TOOLCHAIN/bin/llvm-ar

          export PATH=$TOOLCHAIN/bin:$PATH
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$CC

          # optional tambahan biar aman
          export RUSTFLAGS="-C link-arg=-landroid -C link-arg=-llog"

          cargo build --release --target $TARGET

      # 6. Upload hasil build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pumpkin-android
          path: target/aarch64-linux-android/release/
