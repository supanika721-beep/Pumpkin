name: Build Pumpkin Android ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 3. Add Android target
      - name: Add target
        run: rustup target add aarch64-linux-android

      # 4. Install Android NDK
      - name: Install NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

      # 5. Build (fix semua error sebelumnya)
      - name: Build
        run: |
          export NDK=$PWD/android-ndk-r26d
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=21

          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          export AR=$TOOLCHAIN/bin/llvm-ar

          export PATH=$TOOLCHAIN/bin:$PATH
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$CC

          export RUSTFLAGS="-C link-arg=-landroid -C link-arg=-llog"

          cargo build --release --target $TARGET

      # 6. Lihat isi folder (biar jelas)
      - name: List build output
        run: |
          echo "=== BUILD RESULT ==="
          ls -lh target/aarch64-linux-android/release/

      # 7. Cari binary otomatis
      - name: Find binary
        id: find_bin
        run: |
          BIN=$(find target/aarch64-linux-android/release/ -maxdepth 1 -type f -executable ! -name "*.so" ! -name "*.rlib" | head -n 1)
          echo "Found binary: $BIN"
          echo "bin=$BIN" >> $GITHUB_OUTPUT

      # 8. Upload cuma binary kecil
      - name: Upload binary only
        uses: actions/upload-artifact@v4
        with:
          name: pumpkin-only
          path: ${{ steps.find_bin.outputs.bin }}
