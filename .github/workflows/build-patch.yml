name: Build Pumpkin Android

on:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            arch: arm64-v8a
            api: 21

          - target: armv7-linux-androideabi
            arch: armeabi-v7a
            api: 21

    steps:
      # 1. Checkout source
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 3. Add Android target
      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # 4. Install Android NDK
      - name: Install NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget

          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip

      # 5. Configure Cargo
      - name: Configure Cargo
        run: |
          mkdir -p .cargo

          cat > .cargo/config.toml << EOF
          [profile.release]
          opt-level = "s"
          lto = "thin"
          codegen-units = 1
          panic = "abort"
          strip = "symbols"
          debug = 0
          incremental = false
          EOF

      # 6. Build
      - name: Build
        run: |
          export NDK=$PWD/android-ndk-r26d
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          export TARGET=${{ matrix.target }}
          export API=${{ matrix.api }}

          if [ "$TARGET" = "aarch64-linux-android" ]; then
            export CC=$TOOLCHAIN/bin/aarch64-linux-android${API}-clang
          else
            export CC=$TOOLCHAIN/bin/armv7a-linux-androideabi${API}-clang
          fi

          export AR=$TOOLCHAIN/bin/llvm-ar

          export PATH=$TOOLCHAIN/bin:$PATH

          if [ "$TARGET" = "aarch64-linux-android" ]; then
            export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$CC
          else
            export CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$CC
          fi

          export RUSTFLAGS="-C link-arg=-landroid -C link-arg=-llog"

          cargo build \
            --release \
            --target $TARGET \
            --no-default-features

      # 7. Show build result
      - name: List build output
        run: |
          echo "=== BUILD RESULT ==="
          ls -lh target/${{ matrix.target }}/release/

      # 8. Strip binary
      - name: Strip binary
        run: |
          export NDK=$PWD/android-ndk-r26d
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          STRIP=$TOOLCHAIN/bin/llvm-strip

          BIN=$(find target/${{ matrix.target }}/release/ \
            -maxdepth 1 \
            -type f \
            -executable \
            ! -name "*.so" \
            ! -name "*.rlib" \
            | head -n 1)

          echo "Binary: $BIN"

          $STRIP --strip-all "$BIN"

          ls -lh "$BIN"
          file "$BIN"

      # 9. Find binary
      - name: Find binary
        id: find_bin
        run: |
          BIN=$(find target/${{ matrix.target }}/release/ \
            -maxdepth 1 \
            -type f \
            -executable \
            ! -name "*.so" \
            ! -name "*.rlib" \
            | head -n 1)

          echo "Found binary: $BIN"

          echo "bin=$BIN" >> $GITHUB_OUTPUT

      # 10. Upload binary
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pumpkin-${{ matrix.arch }}
          path: ${{ steps.find_bin.outputs.bin }}
