name: Build Pumpkin for Android

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            arch: arm64-v8a
            api: 28
            clang: aarch64-linux-android28-clang
            rustflags: "-C target-cpu=generic"

          - target: armv7-linux-androideabi
            arch: armeabi-v7a
            api: 28
            clang: armv7a-linux-androideabi28-clang
            rustflags: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26c
          add-to-path: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ matrix.target }}-

      - name: Cache Cargo target
        uses: actions/cache@v4
        with:
          path: target/${{ matrix.target }}
          key: cargo-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ matrix.target }}-

      - name: Generate Cargo config
        run: |
          TOOLCHAIN="${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"

          mkdir -p .cargo

          cat > .cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "${TOOLCHAIN}/aarch64-linux-android28-clang"
          ar = "${TOOLCHAIN}/llvm-ar"

          [target.armv7-linux-androideabi]
          linker = "${TOOLCHAIN}/armv7a-linux-androideabi28-clang"
          ar = "${TOOLCHAIN}/llvm-ar"

          [profile.release]
          opt-level = 2
          lto = false
          codegen-units = 16
          panic = "abort"
          strip = true
          EOF

          cat .cargo/config.toml

      - name: Apply Android patches
        run: |
          if [ -f scripts/patch-android.sh ]; then
            chmod +x scripts/patch-android.sh
            NDK_PATH="${{ steps.ndk.outputs.ndk-path }}" ./scripts/patch-android.sh
          else
            echo "patch-android.sh tidak ditemukan, skip"
          fi

      - name: Build Pumpkin
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}

          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: ""

          CC_aarch64_linux_android: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android28-clang
          AR_aarch64_linux_android: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar

          CC_armv7_linux_androideabi: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi28-clang
          AR_armv7_linux_androideabi: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar

          RUSTFLAGS: ${{ matrix.rustflags }}

        run: |
          cargo build \
            --target ${{ matrix.target }} \
            --release \
            --no-default-features

      - name: Show binary info
        run: |
          BIN="target/${{ matrix.target }}/release/pumpkin"

          if [ -f "$BIN" ]; then
            ls -lah "$BIN"
            file "$BIN"
          else
            echo "Binary tidak ditemukan!"
            echo "Isi folder:"
            ls -lah target/${{ matrix.target }}/release/ || true
            exit 1
          fi

      - name: Strip binary
        run: |
          STRIP="${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          BIN="target/${{ matrix.target }}/release/pumpkin"

          if [ -f "$BIN" ]; then
            "$STRIP" "$BIN"
            echo "Binary stripped"
            ls -lah "$BIN"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pumpkin-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/pumpkin
          if-no-files-found: error

  verify:
    name: Verify binaries
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: pumpkin-*

      - name: Verify ELF binaries
        run: |
          find ./artifacts -type f | while read f; do
            echo "=========="
            echo "FILE: $f"
            echo "=========="

            file "$f"

            if file "$f" | grep -q ELF; then
              readelf -h "$f" || true
              readelf -d "$f" | grep NEEDED || true
            fi
          done
