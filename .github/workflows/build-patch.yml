name: Build PumpkinMC for Android

on:
  push:
    branches:
      - main
      - master
      - dev
      - android-build-workflow

  pull_request:
    branches:
      - main
      - master
      - dev

  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:

  build-arm64:
    name: Build PumpkinMC Android Binary (ARM64)
    runs-on: ubuntu-latest

    env:
      TARGET: aarch64-linux-android
      API_LEVEL: 21

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27b
          add-to-path: true

      - name: Show NDK info
        run: |
          echo "ANDROID_NDK=$ANDROID_NDK"
          ls "$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" | head

      - name: Configure Cargo
        run: |
          mkdir -p ~/.cargo

          cat > ~/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "${ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${API_LEVEL}-clang"
          ar = "${ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"

          [build]
          target-dir = "target"
          EOF

          cat ~/.cargo/config.toml

      - name: Patch Pumpkin for Android
        run: |

          mkdir -p pumpkin/src/android

          cat > pumpkin/src/android/mod.rs << 'EOF'
          //! Android-specific helpers

          #[cfg(target_os = "android")]
          pub const FORCE_DISABLE_TTY: bool = true;

          pub fn get_config_dir() -> std::path::PathBuf {
              std::env::var("PUMPKIN_CONFIG_DIR")
                  .unwrap_or_else(|_| "/data/data/com.example.pumpkinmc/files/config".to_string())
                  .into()
          }

          pub fn get_data_dir() -> std::path::PathBuf {
              std::env::var("PUMPKIN_DATA_DIR")
                  .unwrap_or_else(|_| "/data/data/com.example.pumpkinmc/files".to_string())
                  .into()
          }
          EOF

          grep -q "pub mod android;" pumpkin/src/lib.rs || \
          sed -i '1i #[cfg(target_os = "android")]\npub mod android;' pumpkin/src/lib.rs

      - name: Disable TTY on Android
        run: |
          python3 << 'PYEOF'
          import re

          path = "pumpkin/src/lib.rs"

          with open(path, "r") as f:
              content = f.read()

          old = r'(\s+)\) = if advanced_config\.commands\.use_tty && stdin\(\)\.is_terminal\(\) \{'

          new = r'''\1) = if cfg!(target_os = "android") {
          \1    (Box::new(std::io::stdout()), None)
          \1} else if advanced_config.commands.use_tty && stdin().is_terminal() {'''

          content2 = re.sub(old, new, content)

          if content != content2:
              with open(path, "w") as f:
                  f.write(content2)

              print("TTY patch applied")
          else:
              print("TTY patch already applied or pattern not found")
          PYEOF

      - name: Build Pumpkin ARM64
        run: |

          export CC_aarch64_linux_android="${ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${API_LEVEL}-clang"

          export AR_aarch64_linux_android="${ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"

          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$CC_aarch64_linux_android"

          cargo build \
            --release \
            --target aarch64-linux-android \
            --verbose

      - name: Strip binary
        run: |
          ${ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip \
            target/aarch64-linux-android/release/pumpkin

      - name: Prepare artifacts
        run: |

          mkdir -p release_artifacts

          cp target/aarch64-linux-android/release/pumpkin \
             release_artifacts/pumpkin-arm64

          cd release_artifacts

          sha256sum pumpkin-arm64 > SHA256SUMS

          ls -lah

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pumpkin-android-arm64
          path: release_artifacts/
          retention-days: 30

      - name: Build summary
        run: |
          echo "## Android ARM64 Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Target | aarch64-linux-android |" >> $GITHUB_STEP_SUMMARY
          echo "| API Level | 21 |" >> $GITHUB_STEP_SUMMARY
          echo "| Binary Size | $(du -h release_artifacts/pumpkin-arm64 | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA256 | \`$(cut -d' ' -f1 release_artifacts/SHA256SUMS)\` |" >> $GITHUB_STEP_SUMMARY



  build-arm32:
    name: Build PumpkinMC Android Binary (ARM32)
    runs-on: ubuntu-latest

    env:
      TARGET: armv7-linux-androideabi
      API_LEVEL: 21

    steps:
